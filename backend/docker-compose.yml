version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: talkertive-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - talkertive_db:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: talkertive-redis
    ports:
      - '6379:6379'
    volumes:
      - talkertive_redis:/data
    command: redis-server --appendonly yes

volumes:
  talkertive_db:
  talkertive_redis: